<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Brain">
<meta name="theme-color" content="#F5F5FA">
<title>My Brain</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F5FA;--s1:#FFFFFF;--s2:#F0F0F7;--border:#E2E2EE;
  --text:#1A1A2E;--muted:#8888AA;--dim:#CCCCDD;
  --p:#7C3AED;--p2:#A855F7;--plight:#F3EEFF;
  --green:#059669;--red:#DC2626;--amber:#D97706;--blue:#2563EB;--pink:#DB2777;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,20px);
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
#app{height:100%;display:flex;flex-direction:column;max-width:700px;margin:0 auto;}
#header{padding:calc(14px + var(--safe-top)) 18px 10px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);}
#header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--text);}
#header-stats{font-size:11px;color:var(--muted);margin-top:2px;}
#content{flex:1;overflow-y:auto;padding:14px 16px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#content::-webkit-scrollbar{display:none;}
#nav{display:flex;background:var(--s1);border-top:1px solid var(--border);padding:6px 2px calc(6px + var(--safe-bottom));flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 2px;color:var(--muted);font-family:inherit;font-size:8px;font-weight:500;position:relative;}
.nav-btn .icon{font-size:19px;line-height:1;}
.nav-btn.active{color:var(--p);}
.badge{position:absolute;top:2px;right:calc(50% - 18px);background:var(--p);color:#fff;font-size:8px;font-weight:700;border-radius:99px;padding:1px 4px;min-width:14px;text-align:center;}
.card{background:var(--s1);border-radius:14px;border:1px solid var(--border);padding:13px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.card.la{border-left-width:3px;border-left-style:solid;}
.btn{padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;}
.btn-p{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;}
.btn-p:active{transform:scale(0.97);}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-icon{width:30px;height:30px;border:none;border-radius:8px;cursor:pointer;background:var(--s2);color:var(--muted);font-size:13px;display:inline-flex;align-items:center;justify-content:center;font-family:inherit;}
.fb{background:var(--s1);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
input,textarea,select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:inherit;font-size:13px;outline:none;line-height:1.5;}
input::placeholder,textarea::placeholder{color:var(--muted);}
textarea{resize:none;}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:none;opacity:0.5;}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px;display:block;margin-top:10px;}
.fr{display:flex;gap:8px;}
.fr>*{flex:1;}
.fa{display:flex;gap:8px;margin-top:14px;}
.fa .btn-p{flex:1;}
.pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:5px 11px;border-radius:99px;border:none;cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;background:var(--s2);color:var(--muted);}
.pill.on{background:var(--p);color:#fff;}
.tp{padding:4px 10px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;background:var(--s2);color:var(--muted);}
.progress{height:3px;background:var(--border);border-radius:99px;margin-bottom:14px;overflow:hidden;}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--p2));transition:width 0.6s;}
.tr{display:flex;align-items:flex-start;gap:10px;}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--dim);background:transparent;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;margin-top:1px;font-size:11px;font-weight:700;color:#fff;}
.tt{font-size:14px;font-weight:500;line-height:1.4;color:var(--text);}
.chips{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.chip{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--s2);color:var(--muted);}
.ta{display:flex;gap:3px;flex-shrink:0;margin-left:auto;}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;}
.db{padding:7px 2px;border-radius:11px;border:none;cursor:pointer;background:var(--s1);border:1px solid var(--border);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;}
.db.sel{background:var(--p);border-color:var(--p);}
.db.tod:not(.sel){border-color:var(--p);background:var(--plight);}
.ddow{font-size:8.5px;text-transform:uppercase;font-weight:500;color:var(--muted);}
.dnum{font-size:16px;font-weight:700;color:var(--text);line-height:1;}
.db.sel .ddow,.db.sel .dnum{color:#fff;}
.db.tod:not(.sel) .dnum{color:var(--p);}
.ddots{display:flex;gap:2px;height:5px;align-items:center;margin-top:1px;}
.dot{width:3px;height:3px;border-radius:50%;background:var(--p);}
.db.sel .dot{background:#fff8;}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.wnb{width:34px;height:34px;border-radius:9px;background:var(--s1);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wnc{text-align:center;}
.wnc strong{font-size:12px;font-weight:600;}
.wnc button{font-size:11px;color:var(--p);background:none;border:none;cursor:pointer;display:block;margin:2px auto 0;}
.dd{background:var(--s1);border-radius:16px;border:1px solid var(--border);padding:15px;box-shadow:var(--shadow);}
.ddh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.abtns{display:flex;gap:4px;flex-wrap:wrap;}
.abtn{padding:4px 9px;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;background:var(--s2);color:var(--muted);}
.abtn.on{background:var(--p);color:#fff;border-color:var(--p);}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:0.14em;margin:10px 0 5px;font-weight:600;}
.er{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;background:var(--s2);margin-bottom:4px;}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.gc{background:var(--s1);border-radius:14px;border:1px solid var(--border);padding:14px;cursor:pointer;text-align:center;box-shadow:var(--shadow);}
.gc.on{border-color:var(--p);background:var(--plight);}
.gi{font-size:28px;margin-bottom:6px;}
.gtit{font-size:12px;font-weight:700;margin-bottom:2px;color:var(--text);}
.gdesc{font-size:10px;color:var(--muted);line-height:1.4;}
.tb{background:var(--s1);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.tr2{background:var(--s2);border-radius:12px;padding:14px;margin-top:12px;font-size:13px;line-height:1.7;}
.tr2.ld{display:flex;gap:6px;align-items:center;color:var(--muted);}
.si{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.si:last-child{border-bottom:none;}
.sn{width:22px;height:22px;border-radius:6px;background:var(--p);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.st{font-size:13px;line-height:1.5;flex:1;}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chat-msgs::-webkit-scrollbar{display:none;}
.msg{display:flex;margin-bottom:10px;}
.msg.user{justify-content:flex-end;}
.bubble{max-width:85%;padding:10px 13px;font-size:13px;line-height:1.6;white-space:pre-wrap;}
.msg.assistant .bubble{background:var(--s1);border:1px solid var(--border);border-radius:14px 14px 14px 4px;color:var(--text);}
.msg.user .bubble{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:14px 14px 4px 14px;}
.typing{display:flex;gap:5px;padding:10px 13px;background:var(--s1);border:1px solid var(--border);border-radius:14px 14px 14px 4px;width:fit-content;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--p);animation:bounce 1s infinite;}
.typing span:nth-child(2){animation-delay:0.15s;}
.typing span:nth-child(3){animation-delay:0.3s;}
.cir{display:flex;gap:8px;padding:10px 0 4px;border-top:1px solid var(--border);flex-shrink:0;}
.cir input{flex:1;}
#fo{position:fixed;inset:0;background:rgba(245,245,250,0.97);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
#fo.show{display:flex;}
#ft{font-size:20px;font-weight:600;color:var(--text);line-height:1.4;text-align:center;padding:22px 24px;background:var(--s1);border-radius:18px;border:1px solid var(--border);max-width:360px;width:100%;margin-bottom:28px;box-shadow:var(--shadow);}
#ftimer{font-size:58px;font-weight:300;color:var(--p);font-family:'DM Mono',monospace;letter-spacing:0.05em;margin-bottom:5px;}
#fe{font-size:11px;color:var(--muted);margin-bottom:32px;}
#fa2{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.cdots{display:flex;gap:6px;flex-wrap:wrap;}
.cd{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.cd.on{border-color:var(--text);}
.rbet{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;background:var(--border);outline:none;padding:0;border:none;width:100%;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--p);cursor:pointer;}
.empty{text-align:center;color:var(--dim);padding:28px 0;font-size:13px;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.03)}}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cel{animation:pop 0.5s ease;}
.fi{animation:fi 0.25s ease;}

/* ── Handwriting canvas ── */
#write-wrap{display:flex;flex-direction:column;height:100%;}
#canvas-container{position:relative;flex:1;overflow:hidden;border-radius:14px;border:1px solid var(--border);background:#FFFFFE;box-shadow:var(--shadow);margin-bottom:12px;touch-action:none;}
#lined-canvas{position:absolute;inset:0;pointer-events:none;}
#draw-canvas{position:absolute;inset:0;cursor:crosshair;touch-action:none;}
.write-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.pen-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--s1);}
.pen-btn.on{background:var(--plight);border-color:var(--p);}
.pen-size{width:80px;}
.pen-color{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.pen-color.on{border-color:var(--p);}
.write-actions{display:flex;gap:8px;}
.write-actions .btn-p{flex:1;}

/* preview panel */
.preview-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--s2);border-radius:10px;margin-bottom:6px;}
.preview-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--dim);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:1px;}
.preview-check.on{background:var(--p);border-color:var(--p);color:#fff;}
.preview-text{flex:1;font-size:13px;line-height:1.4;}
.preview-type{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;flex-shrink:0;}

#setup-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
#setup-overlay.hidden{display:none;}
.setup-card{background:var(--s1);border-radius:20px;border:1px solid var(--border);padding:28px;max-width:400px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.1);}
</style>
</head>
<body>
<div id="fo">
  <div style="font-size:11px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:20px;">🎯 Focus Mode</div>
  <div id="ft">Task</div>
  <div id="ftimer">00:00</div>
  <div id="fe">elapsed</div>
  <div id="fa2">
    <button class="btn btn-p" id="fpb" onclick="fPause()">⏸ Pause</button>
    <button class="btn btn-p" style="background:linear-gradient(135deg,#059669,#10B981)" onclick="fDone()">✓ Done</button>
    <button class="btn btn-g" onclick="fExit()">Exit</button>
  </div>
</div>
<div id="setup-overlay">
  <div class="setup-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:48px;margin-bottom:12px">🧠</div>
      <div style="font-size:22px;font-weight:700;margin-bottom:6px">Welcome to My Brain!</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6">To use AI features you need a free Anthropic API key.</div>
    </div>
    <label class="lbl">Anthropic API Key</label>
    <input type="password" id="setup-key" placeholder="sk-ant-..." style="margin-bottom:8px">
    <div id="setup-err" style="font-size:11px;color:var(--red);margin-bottom:8px;display:none">Must start with sk-ant-</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.6">Get one free at <strong>console.anthropic.com</strong> — add ~$5 credit, lasts months. Stored only on this device.</div>
    <button class="btn btn-p" style="width:100%;margin-bottom:10px" id="setup-save-btn">Save and Get Started</button>
    <button class="btn btn-g" style="width:100%;font-size:12px" id="setup-skip-btn">Skip for now</button>
  </div>
</div>
<div id="app">
  <div id="header"><h1>My Brain 🧠</h1><p id="header-stats">Loading…</p></div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="sw('week')" id="nav-week"><span class="icon">📆</span><span>Week</span></button>
    <button class="nav-btn" onclick="sw('tasks')" id="nav-tasks"><span class="icon">🧠</span><span>Tasks</span><span class="badge" id="badge-tasks" style="display:none"></span></button>
    <button class="nav-btn" onclick="sw('work')" id="nav-work"><span class="icon">💼</span><span>Work</span><span class="badge" id="badge-work" style="display:none"></span></button>
    <button class="nav-btn" onclick="sw('appts')" id="nav-appts"><span class="icon">🏥</span><span>Appts</span><span class="badge" id="badge-appts" style="display:none"></span></button>
    <button class="nav-btn" onclick="sw('cal')" id="nav-cal"><span class="icon">📅</span><span>Events</span><span class="badge" id="badge-cal" style="display:none"></span></button>
    <button class="nav-btn" onclick="sw('write')" id="nav-write"><span class="icon">✏️</span><span>Write</span></button>
    <button class="nav-btn" onclick="sw('goblin')" id="nav-goblin"><span class="icon">🪄</span><span>Goblin</span></button>
    <button class="nav-btn" onclick="sw('ai')" id="nav-ai"><span class="icon">⚡</span><span>AI</span></button>
    <button class="nav-btn" onclick="sw('settings')" id="nav-settings"><span class="icon">⚙️</span><span>Settings</span></button>
  </nav>
</div>
<script>
const SK='mbv4';
function gid(){return Math.random().toString(36).slice(2,9);}
const td=new Date();td.setHours(12,0,0,0);
const TS=td.toISOString().split('T')[0];
function aD(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function gWS(ds){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()-d.getDay());return d.toISOString().split('T')[0];}
function fS(ds){if(!ds)return'';return new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function fDL(ds){const d=new Date(ds+'T12:00:00');return{dow:d.toLocaleDateString('en-GB',{weekday:'short'}),day:d.getDate()};}
function dU(ds){const diff=new Date(ds+'T12:00:00')-new Date(TS+'T12:00:00');const d=Math.round(diff/86400000);if(d<0)return'Past';if(d===0)return'Today';if(d===1)return'Tomorrow';return`In ${d}d`;}
const TOM=aD(TS,1);
const PR=[{label:'🔥 Urgent',value:'urgent',color:'#DC2626',bg:'#DC26261A'},{label:'⚡ Important',value:'important',color:'#D97706',bg:'#D977061A'},{label:'🌱 Someday',value:'someday',color:'#059669',bg:'#0596691A'}];
const SZ=[{label:'2 min',value:'tiny'},{label:'15 min',value:'small'},{label:'30 min',value:'medium'},{label:'1 hr+',value:'large'}];
const MD=[{label:'⚡ High',value:'high'},{label:'😐 Medium',value:'medium'},{label:'🥱 Low',value:'low'}];
const AT=[{label:'🏥 Medical',value:'medical',color:'#DB2777'},{label:'💊 Health',value:'health',color:'#7C3AED'},{label:'🦷 Dental',value:'dental',color:'#059669'},{label:'👁 Vision',value:'vision',color:'#2563EB'},{label:'🧠 Mental',value:'mental',color:'#D97706'},{label:'📋 Other',value:'other',color:'#6B7280'}];
const EC=['#7C3AED','#2563EB','#059669','#D97706','#DB2777','#EA580C'];
const DEF={tasks:[{id:gid(),text:'Reply to important email',priority:'urgent',size:'tiny',mood:'medium',date:TS,done:false,starred:false},{id:gid(),text:'Plan the week ahead',priority:'important',size:'small',mood:'high',date:TOM,done:false,starred:true}],work:[{id:gid(),text:'Prep for standup',priority:'important',size:'small',mood:'medium',date:TS,done:false,starred:false}],appts:[{id:gid(),title:'HRT Appointment',type:'health',date:aD(TS,5),time:'10:00',notes:'Bring ID',done:false}],events:[{id:gid(),title:"Alex's Communion ⛪",date:aD(TS,5),time:'10:00',color:'#7C3AED'}],chat:[]};
let S;try{const r=localStorage.getItem(SK);S=r?JSON.parse(r):null;}catch(err){S=null;}
if(!S)S=JSON.parse(JSON.stringify(DEF));
S.tasks.forEach(t=>{if(!t.date)t.date=TS;});
S.work.forEach(t=>{if(!t.date)t.date=TS;});
if(!S.chat)S.chat=[];
function save(){localStorage.setItem(SK,JSON.stringify(S));}

let tab='week',ws=gWS(TS),sd=TS,tf='all',wf='all',sa=null,cid=null,fTask=null,fTime=0,fInt=null,fPd=false,gt='magic';
// canvas state
let penColor='#1A1A2E',penSize=3,penMode='draw',isDrawing=false,lastX=0,lastY=0;
let previewItems=[];

function render(){
  uMeta();
  const c=document.getElementById('content');c.innerHTML='';
  if(tab==='week')rWeek(c);
  else if(tab==='tasks')rTasks(c,S.tasks,'tasks');
  else if(tab==='work')rTasks(c,S.work,'work');
  else if(tab==='appts')rAppts(c);
  else if(tab==='cal')rCal(c);
  else if(tab==='write')rWrite(c);
  else if(tab==='goblin')rGoblin(c);
  else if(tab==='ai')rAI(c);
  else if(tab==='settings')rSettings(c);
}
function uMeta(){
  const at=S.tasks.filter(t=>!t.done).length,aw=S.work.filter(t=>!t.done).length,aa=S.appts.filter(a=>!a.done).length,ae=S.events.filter(e=>e.date>=TS).length;
  document.getElementById('header-stats').textContent=`${at} tasks · ${aw} work · ${aa} appts · ${ae} events`;
  const counts={tasks:at,work:aw,appts:aa,cal:ae};
  for(const[k,v]of Object.entries(counts)){const el=document.getElementById('badge-'+k);if(!el)continue;el.textContent=v;el.style.display=(v>0&&tab!==k)?'block':'none';}
}
function sw(t){tab=t;sa=null;previewItems=[];document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const nb=document.getElementById('nav-'+t);if(nb)nb.classList.add('active');render();}

// ── Week ──────────────────────────────────────────────────────────────────────
function rWeek(root){

function drawLines(canvas){
  const ctx=canvas.getContext('2d');
  const lineHeight=44;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // margin line
  ctx.strokeStyle='#FFCCCC';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(56,0);ctx.lineTo(56,canvas.height);ctx.stroke();
  // ruled lines
  ctx.strokeStyle='#D0D8F0';ctx.lineWidth=1;
  for(let y=lineHeight;y<canvas.height;y+=lineHeight){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();
  }
}

function initDrawing(canvas){
  const ctx=canvas.getContext('2d');
  ctx.lineCap='round';ctx.lineJoin='round';

  function getPos(evOrTouch,canvas){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    let clientX,clientY;
    if(evOrTouch.touches){const t=evOrTouch.touches[0];clientX=t.clientX;clientY=t.clientY;}
    else{clientX=evOrTouch.clientX;clientY=evOrTouch.clientY;}
    return{x:(clientX-rect.left)*scaleX,y:(clientY-rect.top)*scaleY};
  }

  function startDraw(pos){
    isDrawing=true;lastX=pos.x;lastY=pos.y;
    if(penMode==='erase'){ctx.globalCompositeOperation='destination-out';}
    else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=penColor;ctx.lineWidth=penSize;}
    ctx.beginPath();ctx.moveTo(pos.x,pos.y);
  }
  function moveDraw(pos){
    if(!isDrawing)return;
    ctx.lineTo(pos.x,pos.y);ctx.stroke();
    lastX=pos.x;lastY=pos.y;
  }
  function endDraw(){isDrawing=false;ctx.globalCompositeOperation='source-over';}

  // touch (Apple Pencil)
  canvas.addEventListener('touchstart',ev=>{ev.preventDefault();startDraw(getPos(ev,canvas));},{passive:false});
  canvas.addEventListener('touchmove',ev=>{ev.preventDefault();moveDraw(getPos(ev,canvas));},{passive:false});
  canvas.addEventListener('touchend',endDraw,{passive:false});
  // mouse fallback
  canvas.addEventListener('mousedown',ev=>{startDraw(getPos(ev,canvas));});
  canvas.addEventListener('mousemove',ev=>{moveDraw(getPos(ev,canvas));});
  canvas.addEventListener('mouseup',endDraw);
  canvas.addEventListener('mouseleave',endDraw);
}

async function readHandwriting(canvas,btn){
  if(!getKey()){alert('Add your API key in Settings first!');sw('settings');return;}
  const ctx=canvas.getContext('2d');
  // check if blank
  const pd=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasContent=pd.some((v,i)=>i%4===3&&v>0);
  if(!hasContent){alert('Write something first! ✏️');return;}

  btn.textContent='Reading…';btn.disabled=true;

  // get image as base64
  const imgData=canvas.toDataURL('image/png').split(',')[1];

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:`You are a handwriting recognition assistant for an ADHD planner app. 
Look at the handwritten image and extract the todo list items. 
Classify each item as: task (personal), work (work-related), appointment (medical/health), or event (calendar event).
For appointments include any time/date if written.
Respond ONLY with a JSON array: [{"text":"item text","type":"task|work|appointment|event","priority":"urgent|important|someday","notes":"any extra detail like date/time"}]
No markdown, no other text.`,
        messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/png',data:imgData}},{type:'text',text:'Please read this handwritten todo list and extract all items.'}]}]
      })
    });
    const data=await res.json();
    const raw=data.content?.map(c=>c.text||'').join('')||'';
    let items=[];
    try{items=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(err){
      // fallback — try to parse line by line
      items=raw.split('\n').filter(l=>l.trim()).map(l=>({text:l.replace(/^[-•*]\s*/,'').trim(),type:'task',priority:'important'}));
    }
    if(!items.length){btn.textContent='✨ Read my list';btn.disabled=false;alert("Couldn't read the writing — try writing a bit larger or clearer!");return;}
    previewItems=items.map((it,i)=>({...it,id:gid(),selected:true}));
    render();
  }catch(err){
    btn.textContent='✨ Read my list';btn.disabled=false;
    alert('Something went wrong — check your connection and try again!');
  }
}

async function sndAI(inp){
  if(!getKey()){S.chat.push({role:'assistant',text:'Add your API key in Settings to use the AI planner!'});save();render();return;}
  const text=inp.value.trim();if(!text)return;inp.value='';S.chat.push({role:'user',text});save();render();
  const msgs=document.getElementById('chat-msgs');if(msgs){const t=mk('div','typing');t.innerHTML='<span></span><span></span><span></span>';msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;}
  const sys=`You are an ADHD planning assistant. Parse natural language and respond with a brief warm confirmation + JSON.\n\`\`\`json\n{"actions":[{"type":"task"|"work"|"appointment"|"event","title":"string","priority":"urgent"|"important"|"someday","size":"tiny"|"small"|"medium"|"large","mood":"high"|"medium"|"low","date":"YYYY-MM-DD","time":"HH:MM","apptType":"medical"|"health"|"dental"|"vision"|"mental"|"other","notes":"string"}]}\n\`\`\`\nToday is ${TS}. Tomorrow is ${TOM}. Be brief and warm.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:sys,messages:[{role:'user',content:text}]})});
    const data=await r.json();const raw=data.content?.map(c=>c.text||'').join('')||'';
    const jm=raw.match(/```json\s*([\s\S]*?)```/);let actions=[];if(jm){try{actions=JSON.parse(jm[1])?.actions||[];}catch(err){}}
    const dt=raw.replace(/```json[\s\S]*?```/,'').trim();let added=[];
    for(const a of actions){
      if(a.type==='task'){const t={id:gid(),text:a.title,priority:a.priority||'important',size:a.size||'small',mood:a.mood||'medium',date:a.date||TS,done:false,starred:false};S.tasks.unshift(t);added.push(`✅ "${a.title}"`);}
      else if(a.type==='work'){const t={id:gid(),text:a.title,priority:a.priority||'important',size:a.size||'small',mood:a.mood||'medium',date:a.date||TS,done:false,starred:false};S.work.unshift(t);added.push(`💼 "${a.title}"`);}
      else if(a.type==='appointment'){const ap={id:gid(),title:a.title,type:a.apptType||'other',date:a.date||TOM,time:a.time||'09:00',notes:a.notes||'',done:false};S.appts.unshift(ap);added.push(`🏥 "${a.title}" on ${fS(ap.date)}`);}
      else if(a.type==='event'){const ev={id:gid(),title:a.title,date:a.date||TOM,time:a.time||'09:00',color:'#7C3AED'};S.events.unshift(ev);added.push(`📅 "${a.title}" on ${fS(ev.date)}`);}
    }
    S.chat.push({role:'assistant',text:dt+(added.length?'\n\n'+added.join('\n'):'')});save();
  }catch(err){S.chat.push({role:'assistant',text:'Something went wrong — try again!'});save();}
  render();setTimeout(()=>{const ma=document.getElementById('chat-msgs');if(ma)ma.scrollTop=ma.scrollHeight;},80);
}

  info.appendChild(tt);info.appendChild(chips);row.appendChild(info);

  const dr=mk('div','fr');const di=mk('input','');di.type='date';di.value=TOM;const tim=mk('input','');tim.type='time';tim.value='09:00';dr.appendChild(di);dr.appendChild(tim);box.appendChild(dr);
  const ni=mk('textarea','');ni.placeholder='Notes (optional)';ni.rows=2;ni.style.marginTop='8px';box.appendChild(ni);
  const acts=mk('div','fa');const s=mk('button','btn btn-p');s.textContent='Add Appointment';s.onclick=()=>{if(!ti.value.trim())return;onAdd({id:gid(),title:ti.value.trim(),type,date:di.value,time:tim.value,notes:ni.value,done:false});};const c=mk('button','btn btn-g');c.textContent='Cancel';c.onclick=()=>{sa=null;render();};acts.appendChild(s);acts.appendChild(c);box.appendChild(acts);return box;
}

// ── Focus ─────────────────────────────────────────────────────────────────────
function sFocus(task){fTask=task;fTime=0;fPd=false;document.getElementById('ft').textContent=task.text;document.getElementById('fo').classList.add('show');document.getElementById('fpb').textContent='⏸ Pause';clearInterval(fInt);fInt=setInterval(()=>{if(!fPd){fTime++;const m=Math.floor(fTime/60).toString().padStart(2,'0');const s=(fTime%60).toString().padStart(2,'0');document.getElementById('ftimer').textContent=`${m}:${s}`;}},1000);}
function fPause(){fPd=!fPd;document.getElementById('fpb').textContent=fPd?'▶ Resume':'⏸ Pause';}
function fDone(){if(fTask)togT(fTask.id,'tasks');fExit();}
function fExit(){clearInterval(fInt);fTask=null;document.getElementById('fo').classList.remove('show');}

// ── Utils ─────────────────────────────────────────────────────────────────────
function mk(tag,cls){const el=document.createElement(tag);if(cls)el.className=cls.trim();return el;}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}


function getKey(){return localStorage.getItem('mb_apikey')||'';}
function saveKey(k){localStorage.setItem('mb_apikey',k);}

function initSetup(){
  var overlay=document.getElementById('setup-overlay');
  if(!overlay)return;
  if(getKey()){overlay.classList.add('hidden');return;}
  var saveBtn=document.getElementById('setup-save-btn');
  var skipBtn=document.getElementById('setup-skip-btn');
  var inp=document.getElementById('setup-key');
  var err=document.getElementById('setup-err');
  if(saveBtn){
    saveBtn.addEventListener('click',function(){
      var key=inp?inp.value.trim():'';
      if(!key||key.indexOf('sk-ant-')!==0){
        if(err)err.style.display='block';
        if(inp)inp.style.borderColor='var(--red)';
        return;
      }
      saveKey(key);
      overlay.classList.add('hidden');
    });
  }
  if(skipBtn){
    skipBtn.addEventListener('click',function(){
      overlay.classList.add('hidden');
    });
  }
}

function rSettings(root){
  var key=getKey();
  var wrap=mk('div','');wrap.style.cssText='padding:8px 0;';
  var title=mk('div','');
  var h=mk('div','');h.style.cssText='font-size:16px;font-weight:700;margin-bottom:4px';h.textContent='Settings';
  var sub=mk('div','');sub.style.cssText='font-size:12px;color:var(--muted);margin-bottom:20px';sub.textContent='Your API key is stored only on this device';
  title.appendChild(h);title.appendChild(sub);wrap.appendChild(title);
  var card=mk('div','card');
  var lbl=mk('label','lbl');lbl.textContent='Anthropic API Key';card.appendChild(lbl);
  var inp=mk('input','');inp.type='password';inp.placeholder='sk-ant-...';inp.value=key;inp.style.marginBottom='8px';
  var status=mk('div','');status.style.cssText='font-size:12px;margin-bottom:12px;';
  if(key){status.style.color='var(--green)';status.textContent='API key saved - AI features are active';}
  else{status.style.color='var(--amber)';status.textContent='No key saved - AI features will not work';}
  var row=mk('div','fr');
  var saveBtn=mk('button','btn btn-p btn-sm');saveBtn.style.flex='1';saveBtn.textContent='Save Key';
  saveBtn.onclick=function(){var v=inp.value.trim();if(!v)return;saveKey(v);status.style.color='var(--green)';status.textContent='Saved!';};
  var clearBtn=mk('button','btn btn-g btn-sm');clearBtn.textContent='Clear';
  clearBtn.onclick=function(){inp.value='';saveKey('');status.style.color='var(--amber)';status.textContent='Key cleared';};
  row.appendChild(saveBtn);row.appendChild(clearBtn);
  card.appendChild(inp);card.appendChild(status);card.appendChild(row);wrap.appendChild(card);
  var info=mk('div','card');info.style.marginTop='10px';
  var ih=mk('div','');ih.style.cssText='font-size:13px;font-weight:600;margin-bottom:8px';ih.textContent='How to get an API key';
  var il=mk('div','');il.style.cssText='font-size:12px;color:var(--muted);line-height:1.7';il.innerHTML='1. Go to <strong>console.anthropic.com</strong><br>2. Sign up and log in<br>3. Click API Keys and create a key<br>4. Add $5 credit (lasts months!)<br>5. Paste the key above and tap Save';
  info.appendChild(ih);info.appendChild(il);wrap.appendChild(info);
  root.appendChild(wrap);
}

render();
setTimeout(initSetup, 100);
</script>
